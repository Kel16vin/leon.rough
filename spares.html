<!-- spares.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. Tailwind Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 3. YOUR CUSTOM CSS -->
    <link rel="stylesheet" href="style.css">

    <title>AutoMaster Workshop</title>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Catalog | Spare Parts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">

    <!-- NAVIGATION -->
    <nav id="main-nav" class="absolute top-0 left-0 w-full p-4 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-white">🔧 AutoMaster</a>
            <div class="space-x-6">
                <a href="index.html" class="text-white hover:text-blue-400 transition">Home</a>
                <a href="spares.html" class="text-white font-bold border-b-2 border-blue-600">Spare Parts</a>
                <a href="about.html" class="text-white hover:text-blue-400 transition">About</a>
                <a href="contact.html" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition shadow-lg">Book Service</a>
            </div>
        </div>
    </nav>

    <!-- HEADER / HERO AREA -->
    <section class="relative h-[40vh] bg-black flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-black via-black/60 to-black"></div>
        <div class="relative z-10 text-center">
            <h1 id="spares-title" class="text-5xl font-black text-white uppercase tracking-tighter">Spare <span class="text-blue-500">Parts</span></h1>
        </div>
    </section>

    <div class="bg-gradient-to-b from-black to-slate-950 py-24">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold mb-6 reveal text-white">Inventory Catalog</h2>
            <!-- Search Bar -->
            <input type="text" placeholder="Search for filters, pads, or oil..." class="w-full p-4 rounded-xl border border-slate-800 bg-slate-900 text-white mb-10 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none reveal">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Part Card -->
                <div class="bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-800 reveal hover:shadow-xl transition-all">
                    <i class="fas fa-oil-can text-3xl text-blue-500 mb-4"></i>
                    <h4 class="font-bold text-white">Synthetic Oil (5L)</h4>
                    <p class="text-slate-400 mb-4">Grade 5W-40</p>
                    <div class="flex justify-between items-center">
                        <span class="text-lg font-bold text-white">$40.00</span>
                        <button class="text-blue-500 underline font-bold hover:text-blue-400 transition">Details</button>
                    </div>
                </div>
                <!-- Add more cards here... -->
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black text-slate-400 py-16 px-6 border-t border-slate-800">
        <div class="container mx-auto text-center">
            <h1 class="text-white text-2xl font-bold mb-4 italic">🔧 AutoMaster</h1>
            <p class="mb-6">Premium vehicle care and genuine spare parts.</p>
            <p class="text-sm">© 2026 AutoMaster Workshop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.from("#main-nav", { y: -100, opacity: 0, duration: 0.6, ease: "power4.out" })
              .from("#spares-title", { y: 20, opacity: 0, duration: 0.8 }, "-=0.2");
        });

        gsap.utils.toArray(".reveal").forEach((elem) => {
            gsap.to(elem, {
                scrollTrigger: {
                    trigger: elem,
                    start: "top 90%",
                    toggleActions: "play none none none"
                },
                opacity: 1,
                y: 0,
                duration: 0.6,
                ease: "power2.out",
                delay: elem.dataset.gsapDelay || 0
            });
        });
    </script>
</html>
